name: release

# 仅在推 v* tag（如 v1.0.0、v1.2.3-rc.1）或手动触发时执行。
# 产物：Windows NSIS 安装包（.exe），自动附加到同名 GitHub Release。
#
# 使用流程：
#   1. 在 package.json 里把 version 改成要发布的版本（如 1.2.0）
#   2. git commit + git tag v1.2.0 && git push --follow-tags
#   3. 本 workflow 自动跑：构建 sidecar + electron → 上传 .exe 到 Release
#
# 手动触发（workflow_dispatch）只构建 .exe 为 artifact，不创建 Release。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  # 创建 / 编辑 GitHub Releases 需要写权限
  contents: write

jobs:
  windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm 必须在 setup-node 之前 install，这样 setup-node 的 cache: pnpm
      # 能找到 pnpm 二进制并读 pnpm-lock.yaml 生成缓存 key。
      - name: Setup pnpm 10
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Python 3.11 (x64)
        # 3.11 的 pymssql / pywin32 wheel 覆盖最广、PyInstaller 6.x 兼容最稳
        # 显式 x64 避免 future runner 默认切到别的架构。
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Setup uv
        # uv 比 pip 快 ~10 倍，并且有内建 wheel 缓存。这里只做"快速装
        # PyInstaller + cryptography + pywin32 + pymssql 到系统 Python"这
        # 件事，其余 sidecar 打包流程不变。
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: python/requirements-build.txt

      - name: Environment info
        # 版本漂移排障锚点——每次失败都可以从这里查到 runner 上的实际版本。
        shell: pwsh
        run: |
          Write-Host "node   $(node --version)"
          Write-Host "pnpm   $(pnpm --version)"
          Write-Host "python $(python --version)"
          Write-Host "uv     $(uv --version)"
          Write-Host "OS     $(Get-CimInstance Win32_OperatingSystem | Select-Object -ExpandProperty Caption) $([System.Environment]::OSVersion.Version)"
          Write-Host "arch   $env:PROCESSOR_ARCHITECTURE"

      - name: Install Python build deps (via uv)
        run: uv pip install --system -r python/requirements-build.txt

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      # 下面这一串刻意复刻 `pnpm run build:win` 的步骤顺序，但拆成独立
      # action steps 以获得更好的日志可读性和按步失败定位。新手维护者
      # 要加/改步骤时，package.json 里的 `build:win` 和这里必须同步。
      # 两头都调用同一批 `pnpm run sidecar:*` 脚本确保逻辑只写一次。

      - name: Clean stale sidecar artifacts
        run: pnpm run sidecar:clean

      - name: Build sidecar (PyInstaller → hd-sidecar.exe)
        run: pnpm run sidecar:build

      - name: Sidecar smoke test (stdout + stdin round-trip)
        # 启动 exe → 等 system.ready → 发 system.ping → 等响应。
        # 双向验证很关键：v0.1.0 ship 了一个只能写不能读的 sidecar，
        # 老 smoke test 只盯 stdout 结果 CI 一路绿灯，到用户手里全报
        # "sidecar not connected"。见 scripts/sidecar-smoke-test.mjs
        # 顶部注释。本地：pnpm run sidecar:smoke，逻辑完全一致。
        run: pnpm run sidecar:smoke

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build renderer + main (electron-vite)
        run: pnpm exec electron-vite build

      - name: Package Windows installer (electron-builder, unsigned)
        # TODO(signing): 配好 EV 代码签名证书后，把 CSC_LINK / CSC_KEY_PASSWORD
        # 写进仓库 secrets，并把 electron-builder.yml 里的
        # `win.signAndEditExecutable` 改成 true。
        env:
          # 关掉 electron-builder 自动 publish（publish: generic url 还是占位）。
          # 我们用下面的 softprops/action-gh-release 显式上传。
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm exec electron-builder --win --publish never

      - name: Verify installer + packaged sidecar
        # 三道关：
        #   1) dist/*-setup.exe 必须存在（electron-builder 偶尔静悄悄跳过）。
        #   2) dist/win-unpacked 里 hd-sidecar.exe 必须在 resources/hd-sidecar/ 下
        #      （electron-builder.yml 的 extraResources 拼错过一次，installer
        #      跑得起来但运行时 resolve-binary.ts 找不到 sidecar）。
        #   3) 打包进 installer 的那份 sidecar 再跑一次 smoke test，确认
        #      electron-builder 没把 exe 损坏（罕见但发生过 — ASAR 某些路径
        #      会错误 rewrite exe 内嵌的 integrity hash）。
        shell: pwsh
        run: |
          $setup = Get-ChildItem -Path dist -Filter "*-setup.exe" -ErrorAction SilentlyContinue
          if (-not $setup) {
            Write-Error "no *-setup.exe found in dist/"
            exit 1
          }
          Write-Host "installer: $($setup.FullName) ($($setup.Length) bytes)"

          $packedSidecar = "dist/win-unpacked/resources/hd-sidecar/hd-sidecar.exe"
          if (-not (Test-Path $packedSidecar)) {
            Write-Error "sidecar missing from packaged app: $packedSidecar (check electron-builder.yml extraResources)"
            exit 1
          }
          Write-Host "packaged sidecar: $packedSidecar"

          # Round-trip smoke against the extracted-from-installer copy of the
          # exe — catches any ASAR / unpack regression in the final bundle.
          node scripts/sidecar-smoke-test.mjs $packedSidecar

      - name: List dist contents
        shell: bash
        run: ls -la dist/

      - name: Upload workflow artifact (always)
        # 任何触发方式（tag / workflow_dispatch）都上传一份 artifact，
        # 方便调试与内部分发。
        uses: actions/upload-artifact@v4
        with:
          name: historiandownloader-windows
          if-no-files-found: error
          retention-days: 30
          path: |
            dist/*-setup.exe
            dist/*.blockmap
            dist/latest.yml

      - name: Create GitHub Release (tag push only)
        # 只有 tag 触发才发布 Release；workflow_dispatch 手动跑只出 artifact。
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # tag_name / name 默认取自 github.ref_name（即 "v1.2.0"）
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          # 含 "-" 的 tag（v1.2.0-rc.1）自动标记为 prerelease
          generate_release_notes: true
          files: |
            dist/*-setup.exe
            dist/*.blockmap
            dist/latest.yml
