appId: com.electron.app
productName: historiandownloader
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
# PyInstaller-built sidecar binary is dropped under resources/hd-sidecar/
# and shipped verbatim into resources/hd-sidecar/ inside the installed app.
# ``resolve-binary.ts`` expects this exact layout via ``process.resourcesPath``.
extraResources:
  - from: resources/hd-sidecar
    to: hd-sidecar
    filter:
      - '**/*'
win:
  executableName: historiandownloader
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  # TODO(signing): set CSC_LINK / CSC_KEY_PASSWORD (EV code-signing cert)
  # in CI env before flipping signAndEditExecutable to true.
  signAndEditExecutable: false
nsis:
  # 标准向导式安装：有欢迎/协议/目录选择/进度/完成页，不是静默安装。
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
npmRebuild: false
# Auto-update provider. `electron-updater` at runtime reads the bundled
# `app-update.yml` (generated from this config) and fetches `latest.yml` +
# the NSIS installer from the GitHub release matching the next version.
# Public release reads need no token; release.yml uploads assets via
# `softprops/action-gh-release`.
publish:
  provider: github
  owner: ryanhe919
  repo: historian_downloader
