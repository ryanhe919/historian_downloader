appId: com.electron.app
productName: historiandownloader
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
# PyInstaller-built sidecar binary is dropped under resources/hd-sidecar/
# and shipped verbatim into <app>/Contents/Resources/hd-sidecar/ (macOS) or
# resources/hd-sidecar/ (Windows).  ``resolve-binary.ts`` expects exactly this
# layout in prod via ``process.resourcesPath``.
extraResources:
  - from: resources/hd-sidecar
    to: hd-sidecar
    filter:
      - '**/*'
win:
  executableName: historiandownloader
  target:
    - nsis
  # TODO(signing): set CSC_LINK / CSC_KEY_PASSWORD (EV code-signing cert)
  # in CI env before flipping signAndEditExecutable to true.
  signAndEditExecutable: false
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target:
    - dmg
    - zip
  # TODO(signing): set `identity` to "Developer ID Application: <Team>" and
  # enable notarize (requires APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
  # APPLE_TEAM_ID env vars — plumbed through GitHub Actions secrets).
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
# Auto-update provider. `electron-updater` at runtime reads the bundled
# `app-update.yml` (generated from this config) and fetches `latest.yml` +
# the NSIS installer from the GitHub release matching the next version.
# No token is needed to READ public releases; the release.yml workflow
# uploads assets via `softprops/action-gh-release`.
publish:
  provider: github
  owner: ryanhe919
  repo: historian_downloader
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
